<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Turnstile ⊢ in a circle -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="black" stroke-width="32"/>
  <g transform="translate(256, 256)">
    <!-- Vertical bar -->
    <rect x="-80" y="-100" width="40" height="200" rx="4" fill="black"/>
    <!-- Horizontal bar -->
    <rect x="-40" y="-20" width="150" height="40" rx="4" fill="black"/>
  </g>
</svg>