name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # ── Frontend Lint & Format ───────────────────────────────────────────
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: app/package.json
          node-version: "22"

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Prettier check
        working-directory: app
        run: npm run format:check

      - name: ESLint
        working-directory: app
        run: npm run lint

      # npm run check = svelte-check (tsconfig.app.json) + tsc (tsconfig.node.json)
      - name: svelte-check and TypeScript check (app + node)
        working-directory: app
        run: npm run check

      - name: TypeScript check (e2e)
        working-directory: app
        run: npx tsc --noEmit -p tsconfig.e2e.json

      - name: Knip (dead code detection)
        working-directory: app
        run: npm run knip

  # ── Rust Lint & Format ───────────────────────────────────────────────
  # clippy uses clippy-driver, not rustc, so its Cargo fingerprints are
  # incompatible with cargo test / cargo build. This job runs independently;
  # it does NOT share artifacts downstream.
  lint-rust:
    name: Lint Rust
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies (cross-run)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Fast check first — fail before clippy compiles.
      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

  # ── Rust Linux Check ─────────────────────────────────────────────────
  # Catch Linux compilation issues early without a full build.
  check-rust-linux:
    name: Check Rust (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies (cross-run)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: cargo check
        run: cargo check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

  # ── Frontend Unit Tests ──────────────────────────────────────────────
  test-vitest:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: lint-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Vitest (frontend unit tests with coverage)
        working-directory: app
        run: npx vitest run --coverage

      - name: Upload frontend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: app/coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Compile Rust Tests ────────────────────────────────────────────────
  # Independent of lint-rust: clippy-driver fingerprints are incompatible
  # with rustc, so sharing clippy artifacts would just cause recompilation.
  compile-rust-tests:
    name: Compile Rust Tests
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies (cross-run)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}
          # Avoid colliding with the lint-rust Swatinem cache.
          key: test

      # Pin source mtimes to the commit timestamp so that Cargo
      # fingerprints are deterministic when restored in downstream jobs.
      - name: Normalize source timestamps for Cargo fingerprints
        run: |
          ts=$(git log -1 --format=%cd --date=format:%Y%m%d%H%M.%S HEAD)
          find . -not -path '*/target/*' \( -name '*.rs' -o -name 'Cargo.toml' -o -name 'Cargo.lock' -o -name 'build.rs' \) -exec touch -t "$ts" {} +
          touch -t "$ts" .cargo/config.toml

      - name: Compile all test binaries
        run: cargo test --no-run

      - name: Save compiled test artifacts for downstream jobs
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-test-compiled-${{ github.run_id }}-${{ github.run_attempt }}

  # ── Rust Unit Tests ──────────────────────────────────────────────────
  test-rust-unit:
    name: Unit Tests (Rust)
    runs-on: macos-latest
    needs: compile-rust-tests

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Restore Rust test artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-test-compiled-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Normalize source timestamps for Cargo fingerprints
        run: |
          ts=$(git log -1 --format=%cd --date=format:%Y%m%d%H%M.%S HEAD)
          find . -not -path '*/target/*' \( -name '*.rs' -o -name 'Cargo.toml' -o -name 'Cargo.lock' -o -name 'build.rs' \) -exec touch -t "$ts" {} +
          touch -t "$ts" .cargo/config.toml

      - name: cargo llvm-cov --lib (Rust unit tests with coverage)
        run: cargo llvm-cov --lib --lcov --output-path lcov-rust.info

      - name: Normalize Rust LCOV paths to repo-relative
        run: sed -i '' "s|SF:${GITHUB_WORKSPACE}/||g" lcov-rust.info

      - name: Upload Rust coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: lcov-rust.info
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Integration Tests ────────────────────────────────────────────────
  test-rust-integration:
    name: Integration Tests (Lean LSP)
    runs-on: macos-latest
    needs: compile-rust-tests

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust test artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-test-compiled-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Normalize source timestamps for Cargo fingerprints
        run: |
          ts=$(git log -1 --format=%cd --date=format:%Y%m%d%H%M.%S HEAD)
          find . -not -path '*/target/*' \( -name '*.rs' -o -name 'Cargo.toml' -o -name 'Cargo.lock' -o -name 'build.rs' \) -exec touch -t "$ts" {} +
          touch -t "$ts" .cargo/config.toml

      # The integration tests use skip_if_no_project! — they skip gracefully
      # when no Lean project is present (TURNSTILE_PROJECT_PATH unset and the
      # default app-data path absent). Running without env vars exercises the
      # skip path and confirms the Rust code compiles and links correctly.
      - name: cargo test (Lean LSP integration tests)
        run: cargo test --test lean_lsp_integration

  # ── Build ────────────────────────────────────────────────────────────
  # Only produce the full app bundle on pushes to main.
  build:
    name: Build (${{ matrix.platform }})
    if: github.event_name == 'push'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            runner: macos-latest
            artifact-name: turnstile-macos
          - platform: windows
            runner: windows-latest
            artifact-name: turnstile-windows
          - platform: linux
            runner: ubuntu-22.04
            artifact-name: turnstile-linux

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies (cross-run)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true
          # Avoid colliding with lint/test Swatinem caches.
          key: build

      - name: Cache cargo-tauri binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: cargo-tauri-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-tauri-${{ runner.os }}-

      - name: Install cargo-tauri
        run: cargo tauri --version 2>/dev/null || cargo install tauri-cli --locked

      - name: Build Tauri app
        run: cargo tauri build
        env:
          # Disable app signing/notarization in CI (ignored on non-macOS).
          APPLE_SIGNING_IDENTITY: "-"
          CI: "true"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            target/release/bundle/macos/*.app
            target/release/bundle/dmg/*.dmg
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
          retention-days: 7

  # ── E2E Tests ────────────────────────────────────────────────────────
  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    # Playwright starts `npm run dev` (Vite dev server) as the web server;
    # no compiled Tauri app required.
    needs: lint-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        working-directory: app
        run: npx playwright install chromium --with-deps

      - name: Run Playwright e2e tests
        working-directory: app
        run: npm run test:e2e
        env:
          CI: "true"

  # ── CI Gate ──────────────────────────────────────────────────────────
  ci-pass:
    name: CI
    if: always()
    needs:
      - lint-frontend
      - lint-rust
      - check-rust-linux
      - compile-rust-tests
      - test-vitest
      - test-rust-unit
      - test-rust-integration
      - build
      - test-e2e
    runs-on: ubuntu-latest

    steps:
      - name: Check all jobs passed
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          for r in $results; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "::error::Upstream job failed with result: $r"
              exit 1
            fi
          done
          echo "All jobs passed."
