name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # ── Frontend Lint & Format ───────────────────────────────────────────
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: app/package.json
          node-version: "22"

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Prettier check
        working-directory: app
        run: npm run format:check

      - name: ESLint
        working-directory: app
        run: npm run lint

      # npm run check = svelte-check (tsconfig.app.json) + tsc (tsconfig.node.json)
      - name: svelte-check and TypeScript check (app + node)
        working-directory: app
        run: npm run check

      - name: TypeScript check (e2e)
        working-directory: app
        run: npx tsc --noEmit -p tsconfig.e2e.json

      - name: Knip (dead code detection)
        working-directory: app
        run: npm run knip

  # ── Rust Lint & Format ───────────────────────────────────────────────
  # clippy uses clippy-driver, not rustc, so its Cargo fingerprints are
  # incompatible with cargo test / cargo build. This job runs independently;
  # it does NOT share artifacts downstream.
  lint-rust:
    name: Lint Rust
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies (cross-run)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Fast check first — fail before clippy compiles.
      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

  # ── Rust Linux Check ─────────────────────────────────────────────────
  # Catch Linux compilation issues early without a full build.
  check-rust-linux:
    name: Check Rust (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies (cross-run)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: cargo check
        run: cargo check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

  # ── Frontend Unit Tests ──────────────────────────────────────────────
  test-vitest:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: lint-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Vitest (frontend unit tests with coverage)
        working-directory: app
        run: npx vitest run --coverage

      - name: Upload frontend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: app/coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Compile Rust Tests ────────────────────────────────────────────────
  # Independent of lint-rust: clippy-driver fingerprints are incompatible
  # with rustc, so sharing clippy artifacts would just cause recompilation.
  #
  # Compiles test binaries *with coverage instrumentation* so the downstream
  # llvm-cov jobs can reuse the artifacts via --no-clean. A plain
  # `cargo test --no-run` would use different RUSTFLAGS and be thrown away
  # by Cargo's fingerprint check on the llvm-cov side.
  compile-rust-tests:
    name: Compile Rust Tests
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Rust dependencies (cross-run)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}
          # Avoid colliding with the lint-rust Swatinem cache.
          key: test

      # Pin source mtimes to the commit timestamp so that Cargo
      # fingerprints are deterministic when restored in downstream jobs.
      - name: Normalize source timestamps for Cargo fingerprints
        run: |
          ts=$(git log -1 --format=%cd --date=format:%Y%m%d%H%M.%S HEAD)
          find . -not -path '*/target/*' \( -name '*.rs' -o -name 'Cargo.toml' -o -name 'Cargo.lock' -o -name 'build.rs' \) -exec touch -t "$ts" {} +
          touch -t "$ts" .cargo/config.toml

      # Compile once with coverage instrumentation. `show-env --sh` exports
      # the env vars (RUSTFLAGS=-Cinstrument-coverage, LLVM_PROFILE_FILE,
      # etc.) that cargo-llvm-cov normally injects, so `cargo test --no-run`
      # produces artifacts that the downstream llvm-cov jobs can reuse.
      #
      # Source from a file (not process substitution) because macOS runners
      # ship bash 3.2, where `source <(...)` drops some exports silently.
      - name: Compile all test binaries with coverage instrumentation
        run: |
          cargo llvm-cov show-env --sh > llvm-cov-env.sh
          . ./llvm-cov-env.sh
          cargo test --no-run

      - name: Save compiled test artifacts for downstream jobs
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-test-compiled-${{ github.run_id }}-${{ github.run_attempt }}

  # ── Rust Unit Tests ──────────────────────────────────────────────────
  test-rust-unit:
    name: Unit Tests (Rust)
    runs-on: macos-latest
    needs: compile-rust-tests

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Restore Rust test artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-test-compiled-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Normalize source timestamps for Cargo fingerprints
        run: |
          ts=$(git log -1 --format=%cd --date=format:%Y%m%d%H%M.%S HEAD)
          find . -not -path '*/target/*' \( -name '*.rs' -o -name 'Cargo.toml' -o -name 'Cargo.lock' -o -name 'build.rs' \) -exec touch -t "$ts" {} +
          touch -t "$ts" .cargo/config.toml

      # Run under `show-env` so the same target dir + env vars are used
      # as in compile-rust-tests. `cargo llvm-cov --no-clean --lib` would
      # use target/llvm-cov-target/ instead of target/, miss the cached
      # artifacts, and rebuild everything.
      #
      # Source from a file (not process substitution) because macOS runners
      # ship bash 3.2, where `source <(...)` drops some exports silently.
      # See taiki-e/cargo-llvm-cov's own CI for this same workaround.
      - name: cargo test --lib + llvm-cov report (Rust unit tests)
        run: |
          cargo llvm-cov show-env --sh > llvm-cov-env.sh
          . ./llvm-cov-env.sh
          cargo test --lib
          cargo llvm-cov report --lcov --output-path lcov-rust.info

      - name: Normalize Rust LCOV paths to repo-relative
        run: sed -i '' "s|SF:${GITHUB_WORKSPACE}/||g" lcov-rust.info

      - name: Upload Rust coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: lcov-rust.info
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Rust Doc Tests ──────────────────────────────────────────────────
  test-rust-doc:
    name: Doc Tests (Rust)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies (cross-run)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}
          key: doc

      - name: cargo test --doc
        run: cargo test --doc

  # ── Integration Tests ────────────────────────────────────────────────
  test-rust-integration:
    name: Integration Tests (Lean LSP)
    runs-on: macos-latest
    needs: compile-rust-tests

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Restore Rust test artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-test-compiled-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Normalize source timestamps for Cargo fingerprints
        run: |
          ts=$(git log -1 --format=%cd --date=format:%Y%m%d%H%M.%S HEAD)
          find . -not -path '*/target/*' \( -name '*.rs' -o -name 'Cargo.toml' -o -name 'Cargo.lock' -o -name 'build.rs' \) -exec touch -t "$ts" {} +
          touch -t "$ts" .cargo/config.toml

      # ── Lean toolchain setup ──────────────────────────────────────────
      - name: Set Lean project path
        run: echo "LEAN_PROJECT=$HOME/lean-ci-project" >> "$GITHUB_ENV"

      - name: Extract Lean toolchain and Mathlib versions
        id: lean-versions
        run: |
          LEAN_TOOLCHAIN=$(grep 'const LEAN_TOOLCHAIN' src-tauri/src/setup.rs | sed 's/.*"\(.*\)".*/\1/')
          MATHLIB_REV=$(grep 'const MATHLIB_REV' src-tauri/src/setup.rs | sed 's/.*"\(.*\)".*/\1/')
          echo "lean-toolchain=$LEAN_TOOLCHAIN" >> "$GITHUB_OUTPUT"
          echo "mathlib-rev=$MATHLIB_REV" >> "$GITHUB_OUTPUT"
          echo "Lean toolchain: $LEAN_TOOLCHAIN"
          echo "Mathlib rev: $MATHLIB_REV"

      - name: Cache elan toolchain
        id: cache-elan
        uses: actions/cache@v4
        with:
          path: ~/.elan
          key: elan-${{ runner.os }}-${{ steps.lean-versions.outputs.lean-toolchain }}

      - name: Install elan
        if: steps.cache-elan.outputs.cache-hit != 'true'
        run: curl -sSf https://elan.lean-lang.org/elan-init.sh | sh -s -- --no-modify-path -y

      - name: Add elan to PATH
        run: echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lean project (Lake packages + Mathlib oleans)
        id: cache-lean-project
        uses: actions/cache@v4
        with:
          # lake-manifest.json lives at the project root, not inside .lake/.
          # Without it, lake regenerates the manifest at test time (running
          # mathlib post-update hooks) which pollutes LSP JSON output and
          # breaks integration tests on every cache-hit run.
          path: |
            ${{ env.LEAN_PROJECT }}/.lake
            ${{ env.LEAN_PROJECT }}/lake-manifest.json
          # v2: bust the cache since v1 omitted lake-manifest.json.
          key: lean-project-v2-${{ runner.os }}-${{ steps.lean-versions.outputs.mathlib-rev }}

      - name: Create Lean project
        run: |
          proj="$LEAN_PROJECT"
          mkdir -p "$proj"
          echo '${{ steps.lean-versions.outputs.lean-toolchain }}' > "$proj/lean-toolchain"
          printf '%s\n' \
            'name = "turnstile-scratch"' \
            'version = "0.1.0"' \
            '' \
            '[[require]]' \
            'name = "mathlib"' \
            'scope = "leanprover-community"' \
            'rev = "${{ steps.lean-versions.outputs.mathlib-rev }}"' \
            '' \
            '[[lean_lib]]' \
            'name = "Proof"' \
            > "$proj/lakefile.toml"
          printf '%s\n' \
            'import Mathlib' \
            '' \
            '-- Write Lean 4 + Mathlib proofs here.' \
            > "$proj/Proof.lean"

      - name: Fetch Mathlib (lake update)
        if: steps.cache-lean-project.outputs.cache-hit != 'true'
        run: cd "$LEAN_PROJECT" && lake update

      - name: Download Mathlib build cache
        if: steps.cache-lean-project.outputs.cache-hit != 'true'
        run: cd "$LEAN_PROJECT" && lake exe cache get

      - name: Verify Lean setup
        run: |
          lean --version
          lake --version
          test -d "$LEAN_PROJECT/.lake/packages/mathlib"

      # ── Run integration tests with coverage ───────────────────────────
      # Run under `show-env` so the same target dir + env vars are used
      # as in compile-rust-tests. `cargo llvm-cov --no-clean --test` would
      # use target/llvm-cov-target/ instead of target/, miss the cached
      # artifacts, and rebuild everything.
      #
      # Source from a file (not process substitution) because macOS runners
      # ship bash 3.2, where `source <(...)` drops some exports silently.
      - name: cargo test --test + llvm-cov report (Lean LSP integration)
        run: |
          cargo llvm-cov show-env --sh > llvm-cov-env.sh
          . ./llvm-cov-env.sh
          cargo test --test lean_lsp_integration
          cargo llvm-cov report --lcov --output-path lcov-integration.info
        env:
          TURNSTILE_PROJECT_PATH: ${{ env.LEAN_PROJECT }}

      - name: Normalize integration LCOV paths to repo-relative
        run: sed -i '' "s|SF:${GITHUB_WORKSPACE}/||g" lcov-integration.info

      - name: Upload integration coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: lcov-integration.info
          flags: rust-integration
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Build ────────────────────────────────────────────────────────────
  # Only produce the full app bundle on pushes to main.
  build:
    name: Build (${{ matrix.platform }})
    if: github.event_name == 'push'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            runner: macos-latest
            artifact-name: turnstile-macos
          - platform: windows
            runner: windows-latest
            artifact-name: turnstile-windows
          - platform: linux
            runner: ubuntu-22.04
            artifact-name: turnstile-linux

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies (cross-run)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true
          # Avoid colliding with lint/test Swatinem caches.
          key: build

      - name: Cache cargo-tauri binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: cargo-tauri-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-tauri-${{ runner.os }}-

      - name: Install cargo-tauri
        run: cargo tauri --version 2>/dev/null || cargo install tauri-cli --locked

      - name: Build Tauri app
        run: cargo tauri build
        env:
          # Disable app signing/notarization in CI (ignored on non-macOS).
          APPLE_SIGNING_IDENTITY: "-"
          CI: "true"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            target/release/bundle/macos/*.app
            target/release/bundle/dmg/*.dmg
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
          retention-days: 7

  # ── E2E Tests ────────────────────────────────────────────────────────
  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    # Playwright starts `npm run dev` (Vite dev server) as the web server;
    # no compiled Tauri app required.
    needs: lint-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        working-directory: app
        run: npx playwright install chromium --with-deps

      - name: Run Playwright e2e tests
        working-directory: app
        run: npm run test:e2e
        env:
          CI: "true"

  # ── CI Gate ──────────────────────────────────────────────────────────
  ci-pass:
    name: CI
    if: always()
    needs:
      - lint-frontend
      - lint-rust
      - check-rust-linux
      - compile-rust-tests
      - test-vitest
      - test-rust-unit
      - test-rust-doc
      - test-rust-integration
      - build
      - test-e2e
    runs-on: ubuntu-latest

    steps:
      - name: Check all jobs passed
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          for r in $results; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "::error::Upstream job failed with result: $r"
              exit 1
            fi
          done
          echo "All jobs passed."
