name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # ── Frontend Lint & Format ───────────────────────────────────────────
  lint-frontend:
    name: Lint Frontend
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: app/package.json
          node-version: "22"

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Prettier check
        working-directory: app
        run: npm run format:check

      - name: ESLint
        working-directory: app
        run: npm run lint

      # npm run check = svelte-check (tsconfig.app.json) + tsc (tsconfig.node.json)
      - name: svelte-check and TypeScript check (app + node)
        working-directory: app
        run: npm run check

      - name: TypeScript check (e2e)
        working-directory: app
        run: npx tsc --noEmit -p tsconfig.e2e.json

      - name: Knip (dead code detection)
        working-directory: app
        run: npm run knip

  # ── Rust Lint & Format ───────────────────────────────────────────────
  lint-rust:
    name: Lint Rust
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies (cross-run)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Fast check first — fail before clippy compiles.
      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      # Save compiled artifacts for downstream Rust jobs in this run.
      - name: Save Rust artifacts for downstream jobs
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-compiled-${{ github.run_id }}-${{ github.run_attempt }}

  # ── Frontend Unit Tests ──────────────────────────────────────────────
  test-vitest:
    name: Unit Tests (Vitest)
    runs-on: macos-latest
    needs: lint-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Vitest (frontend unit tests)
        working-directory: app
        run: npm test

  # ── Compile Rust Tests ────────────────────────────────────────────────
  compile-rust-tests:
    name: Compile Rust Tests
    runs-on: macos-latest
    needs: lint-rust

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust artifacts from lint-rust
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-compiled-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Compile all test binaries
        run: cargo test --no-run

      - name: Save compiled test artifacts for downstream jobs
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-test-compiled-${{ github.run_id }}-${{ github.run_attempt }}

  # ── Rust Unit Tests ──────────────────────────────────────────────────
  test-rust-unit:
    name: Unit Tests (Rust)
    runs-on: macos-latest
    needs: compile-rust-tests

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust test artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-test-compiled-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Backdate sources so Cargo trusts cached artifacts
        run: |
          find . -not -path '*/target/*' \( -name '*.rs' -o -name 'Cargo.toml' -o -name 'Cargo.lock' -o -name 'build.rs' \) -exec touch -t 200001010000 {} +
          touch -t 200001010000 .cargo/config.toml

      - name: cargo test --lib (Rust unit tests)
        run: cargo test --lib

  # ── Integration Tests ────────────────────────────────────────────────
  test-rust-integration:
    name: Integration Tests (Lean LSP)
    runs-on: macos-latest
    needs: compile-rust-tests

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust test artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-test-compiled-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Backdate sources so Cargo trusts cached artifacts
        run: |
          find . -not -path '*/target/*' \( -name '*.rs' -o -name 'Cargo.toml' -o -name 'Cargo.lock' -o -name 'build.rs' \) -exec touch -t 200001010000 {} +
          touch -t 200001010000 .cargo/config.toml

      # The integration tests use skip_if_no_project! — they skip gracefully
      # when no Lean project is present (TURNSTILE_PROJECT_PATH unset and the
      # default app-data path absent). Running without env vars exercises the
      # skip path and confirms the Rust code compiles and links correctly.
      - name: cargo test (Lean LSP integration tests)
        run: cargo test --test lean_lsp_integration

  # ── Build ────────────────────────────────────────────────────────────
  # Clippy already proves compilation on PRs; only produce the full
  # app bundle on pushes to main.
  build:
    name: Build (macOS)
    if: github.event_name == 'push'
    runs-on: macos-latest
    needs: lint-rust

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust artifacts from lint-rust
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-compiled-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Cache cargo-tauri binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: cargo-tauri-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-tauri-${{ runner.os }}-

      - name: Install cargo-tauri
        run: cargo tauri --version 2>/dev/null || cargo install tauri-cli --locked

      - name: Build frontend
        working-directory: app
        run: npm run build

      - name: Build Tauri app
        run: cargo tauri build
        env:
          # Disable app signing/notarization in CI.
          APPLE_SIGNING_IDENTITY: "-"
          CI: "true"

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: turnstile-macos
          path: src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn
          retention-days: 7

  # ── E2E Tests ────────────────────────────────────────────────────────
  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: macos-latest
    # Playwright starts `npm run dev` (Vite dev server) as the web server;
    # no compiled Tauri app required.
    needs: lint-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        working-directory: app
        run: npx playwright install chromium --with-deps

      - name: Run Playwright e2e tests
        working-directory: app
        run: npm run test:e2e
        env:
          CI: "true"

  # ── CI Gate ──────────────────────────────────────────────────────────
  ci-pass:
    name: CI
    if: always()
    needs:
      - lint-frontend
      - lint-rust
      - compile-rust-tests
      - test-vitest
      - test-rust-unit
      - test-rust-integration
      - build
      - test-e2e
    runs-on: ubuntu-latest

    steps:
      - name: Check all jobs passed
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          for r in $results; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "::error::Upstream job failed with result: $r"
              exit 1
            fi
          done
          echo "All jobs passed."
